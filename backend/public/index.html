<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>总调度室综合管理系统</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1d23">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c8a04a;--gold-light:#e0c878;--copper:#b87333;--steel:#7a8a9a;--danger:#e05555;--warning:#d4a017;--success:#5a9e5f;--bg:#1a1d23;--surface:#242830;--surface2:#2a2e38;--border:#3a3f4a;--text:#d0d4dc;--text2:#9098a6}
body{font-family:-apple-system,BlinkMacSystemFont,'Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 50%,rgba(200,160,74,.04)0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(184,115,51,.04)0%,transparent 50%)}
.topbar{background:linear-gradient(180deg,#2a2e38 0%,#1e2128 100%);border-bottom:1px solid var(--border);color:var(--text);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.3);position:sticky;top:0;z-index:100}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,var(--gold-light),var(--copper));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.user-area{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text2)}
.user-area select{padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;outline:none}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;letter-spacing:.5px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.btn-p{background:linear-gradient(135deg,var(--gold),var(--copper));color:#1a1d23;font-weight:600}
.btn-s{background:linear-gradient(135deg,#4a8f5a,#3d7349);color:#fff}
.btn-d{background:linear-gradient(135deg,#c0392b,#96281b);color:#fff}
.btn-o{background:transparent;color:var(--gold);border:1px solid var(--gold)}
.btn-o:hover{background:rgba(200,160,74,.1)}
.btn-sm{padding:5px 12px;font-size:12px}
.layout{max-width:1200px;margin:0 auto;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:border-color .2s}
.card:hover{border-color:#4a4f5a}
.card-title{font-size:16px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;color:var(--text)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px}
.stat-item{text-align:center;padding:18px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;transition:all .2s;position:relative;overflow:hidden}
.stat-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s}
.stat-item:hover::before,.stat-item:hover::after{opacity:1}
.stat-item:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.stat-num{font-size:30px;font-weight:800;color:var(--gold)}
.stat-label{font-size:12px;color:var(--text2);margin-top:6px;text-transform:uppercase;letter-spacing:1px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);font-weight:600;color:var(--text2);white-space:nowrap;letter-spacing:.5px;font-size:11px;text-transform:uppercase}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
tr:hover td{background:rgba(200,160,74,.04)}
.tag{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap;letter-spacing:.5px}
.t-pending{background:rgba(212,160,23,.15);color:var(--warning);border:1px solid rgba(212,160,23,.3)}
.t-progress{background:rgba(122,138,154,.15);color:#a0b0c0;border:1px solid rgba(122,138,154,.3)}
.t-done{background:rgba(90,158,95,.15);color:var(--success);border:1px solid rgba(90,158,95,.3)}
.t-reject{background:rgba(224,85,85,.15);color:var(--danger);border:1px solid rgba(224,85,85,.3)}
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:6px;font-weight:500;font-size:13px;color:var(--text2);letter-spacing:.5px}
input,select,textarea{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--bg);color:var(--text);transition:all .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,160,74,.12)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
textarea{resize:vertical;min-height:80px}
::placeholder{color:#5a5e68}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;width:90%;max-width:550px;max-height:85vh;overflow:auto;box-shadow:0 16px 48px rgba(0,0,0,.5)}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:7px 16px;border-radius:20px;background:var(--surface2);color:var(--text2);font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all .2s;white-space:nowrap}
.tab:hover{border-color:var(--gold);color:var(--text)}
.tab.active{background:linear-gradient(135deg,var(--gold),var(--copper));color:#1a1d23;border-color:transparent;font-weight:600}
.empty{text-align:center;padding:50px 20px;color:var(--text2)}
.order-no{font-family:'JetBrains Mono','Fira Code',monospace;font-weight:700;color:var(--gold-light)}
.flex{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.timeline{border-left:2px solid var(--border);padding-left:18px;margin-left:8px}
.tl-item{padding:8px 0;position:relative}
.tl-item::before{content:'';position:absolute;left:-24px;top:12px;width:10px;height:10px;border-radius:50%;background:var(--border);border:2px solid var(--surface)}
.tl-item:last-child::before{background:var(--gold);box-shadow:0 0 8px rgba(200,160,74,.4)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.quiz-modal{max-width:560px;padding:0;overflow:hidden;background:var(--surface);border-radius:14px}
.quiz-progress-bar{width:100%;height:4px;background:var(--surface2)}
.quiz-progress-fill{height:100%;background:linear-gradient(to right,var(--gold),var(--copper));transition:width .3s ease}
.quiz-body{padding:24px}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.quiz-question{font-size:16px;font-weight:600;color:var(--text);line-height:1.6;margin-bottom:20px}
.quiz-options{display:flex;flex-direction:column;gap:10px}
.quiz-opt{padding:14px 16px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s;font-size:14px;color:var(--text)}
.quiz-opt:hover{border-color:var(--gold);background:rgba(200,160,74,.06)}
.quiz-selected{border-color:var(--gold)!important;background:rgba(200,160,74,.12)!important;box-shadow:0 0 0 1px var(--gold)}
.q-opt-letter{width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.quiz-selected .q-opt-letter{background:var(--gold);color:#1a1d23}
.quiz-footer{text-align:right;margin-top:20px}
.quiz-btn{padding:12px 32px;font-size:15px;border-radius:8px}
.like-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:14px;cursor:pointer;font-size:12px;transition:all .2s}
.like-btn:hover{border-color:var(--primary);color:var(--primary)}
.like-btn.liked{background:rgba(200,160,74,.12);border-color:var(--gold);color:var(--gold)}
.quiz-result-top{text-align:center;padding:30px 20px}
.radio-pill-group{display:flex;gap:10px;flex-wrap:wrap}
.radio-pill{display:flex;align-items:center;gap:6px;padding:10px 16px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;flex:1;text-align:center;justify-content:center;min-width:120px}
.radio-pill:hover{border-color:var(--gold);color:var(--text)}
.radio-pill.active{border-color:var(--gold);background:rgba(200,160,74,.12);color:var(--gold);font-weight:600;box-shadow:0 0 0 1px var(--gold)}
.upload-btn:hover{border-color:var(--gold)!important;background:rgba(200,160,74,.06)!important;color:var(--text)!important}
/* 通知面板 */
.notif-panel{position:fixed;right:16px;width:380px;max-width:92vw;z-index:2000;animation:notifIn .2s ease}
.notif-panel-inner{max-height:420px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 48px rgba(0,0,0,.55)}
.notif-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);border-radius:12px 12px 0 0;z-index:2}
.notif-header b{font-size:15px}
.notif-empty{padding:32px 16px;text-align:center;color:var(--text2);font-size:14px}
.notif-item{display:block;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;text-decoration:none;color:inherit;width:100%}
.notif-item:last-child{border-bottom:none;border-radius:0 0 12px 12px}
.notif-item:hover{background:rgba(200,160,74,.08)}
.notif-item:active{background:rgba(200,160,74,.15)}
.notif-item.unread{background:rgba(200,160,74,.04)}
.notif-item.unread:hover{background:rgba(200,160,74,.12)}
.notif-item-head{display:flex;align-items:flex-start;gap:8px;margin-bottom:4px}
.notif-item-icon{flex-shrink:0;font-size:18px;width:24px;text-align:center}
.notif-item-title{flex:1;font-weight:600;font-size:14px;line-height:1.3}
.notif-item-time{flex-shrink:0;font-size:11px;color:var(--text2);white-space:nowrap}
.notif-item-body{font-size:12px;color:var(--text2);line-height:1.4;margin-left:32px}
.notif-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);margin-right:6px;flex-shrink:0}
@keyframes notifIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
@media(max-width:768px){
  .row2,.row3,.grid-3{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .topbar h1{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar{padding:6px 10px;position:sticky;top:0}
  .layout{padding:8px}
  .card{padding:10px;margin-bottom:8px;overflow:auto}
  .modal{width:98%;padding:14px;max-width:98%}
  .btn{padding:10px 14px;font-size:14px}
  table{font-size:11px;min-width:600px}
  th,td{padding:5px 7px}
  .stat-num{font-size:20px}
  .stat-item{padding:12px 8px}
  .stat-label{font-size:10px}
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .flex{flex-wrap:wrap;gap:6px}
  .order-no{font-size:11px}
  input,select,textarea{font-size:16px;padding:8px 10px}
  #liveClock{display:none}
}
</style>
</head>
<body>
<div class="topbar">
  <h1>🛠️ 总调度室综合管理系统 <span id="liveClock" style="font-size:14px;margin-left:12px;color:var(--gold);font-family:monospace">--:--:--</span></h1>
  <div class="user-area" id="userArea" style="display:none">
    <span id="notifyBell" style="cursor:pointer;position:relative;margin-right:10px;font-size:20px" onclick="toggleNotifPanel()" title="通知">🔔<span id="notifyBadge" style="position:absolute;top:-6px;right:-10px;background:var(--danger);color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:10px;display:none;align-items:center;justify-content:center;padding:0 3px;line-height:18px">0</span></span>
    <span id="currentUser"></span>

    <button class="btn btn-sm btn-o" onclick="changePassword()" style="color:var(--text);border-color:var(--border);margin-right:4px">修改密码</button>
    <button class="btn btn-sm btn-o" onclick="doLogout()" style="color:var(--text);border-color:var(--border)">退出</button>
  </div>
</div>
<div id="notifPanel" class="notif-panel" style="display:none">
  <div class="notif-panel-inner"></div>
</div>
<div id="app">
  <div id="loginPage" class="modal-mask">
    <div class="modal" style="text-align:center">
      <h2 style="margin-bottom:8px">🛠️</h2>
      <h2>总调度室综合管理系统</h2>
      <p style="color:var(--text2);margin:8px 0 24px">请输入手机号登录</p>
      <div class="form-group"><input id="loginPhone" placeholder="手机号" /></div>
      <div class="form-group"><input id="loginPwd" type="password" placeholder="请输入密码" /></div>
      <button class="btn btn-p" style="width:100%" onclick="doLogin()">登录</button>
      <p style="text-align:right;margin-top:10px"><a style="color:var(--text2);font-size:12px;cursor:pointer" onclick="changePwdAtLogin()">修改密码</a></p>
    </div>
  </div>
  <div id="mainPage" style="display:none"></div>
</div>

<script>

// ==================== 核心框架：全局变量 / 工具 / 登录 / 模态框 ====================

// HTML 转义 — 全局 XSS 防护
function escHtml(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}

let TOKEN='',USER=null,LAST_DEPTS=[];
const API='/api',ROLE_MAP={driver:'驾驶员',repair_shop:'修理厂',leader:'科级审批',admin:'管理员',safety_officer:'安全员',dispatcher:'车辆调度员',applicant:'用车申请人'};
const STATUS_MAP={pending_accept:'待接单',pending_quote:'待报价',pending_approval:'待审批',approved:'已通过',rejected:'已驳回',repairing:'维修中',completed:'待验收',accepted:'已完成',cancelled:'已取消'};
const ST_TAG={pending_accept:'t-pending',pending_quote:'t-pending',pending_approval:'t-reject',approved:'t-progress',rejected:'t-reject',repairing:'t-progress',completed:'t-done',accepted:'t-done'};
const LEVEL_MAP={high:'高位',mid:'中位',low:'低位'},APPEAR_MAP={normal:'正常',damaged:'有损坏',dirty:'需清洁'},TIRE_MAP={normal:'正常',worn:'磨损',damaged:'损坏'};

function toast(m,t){var b=document.createElement('div');b.style.cssText='position:fixed;top:16px;right:16px;z-index:9999;padding:14px 24px;border-radius:8px;color:#fff;font-weight:600;font-size:15px;animation:slideIn .3s ease;max-width:350px;box-shadow:0 8px 24px rgba(0,0,0,.4);';b.style.background=t==='error'?'linear-gradient(135deg,#c0392b,#96281b)':'linear-gradient(135deg,#4a8f5a,#3d7349)';b.textContent=(t==='error'?'✕ ':'✓ ')+m;document.body.appendChild(b);setTimeout(function(){b.style.opacity='0';b.style.transition='opacity .3s';setTimeout(function(){b.remove()},300)},2000)}

function actionName(a){var m={accepted_order:"修理厂接单",quote_submitted:"提交报价",approved:"审批通过",rejected:"驳回",accepted_and_quoted:"接单并报价",department_approved:"部门审批通过",department_rejected:"部门驳回",progress:"维修进度",progress_update:"维修进度",completed:"维修完成",accepted:"验收通过",urgent:"标记加急"};return m[a]||a}
async function api(url,opts){
  opts=opts||{};
  var hdr={'Content-Type':'application/json'};
  if(TOKEN)hdr['Authorization']='Bearer '+TOKEN;
  var r=await fetch(API+url,{headers:hdr,method:opts.method||'GET',body:opts.data?JSON.stringify(opts.data):undefined});
  var d=await r.json();
  if(d.code===401){doLogout();return null}
  if(d.code!==200){alert(d.msg||'操作失败');return null}
  return d.data;
}

// ===== 登录 =====
async function doLogin(){
  var ph=document.getElementById('loginPhone').value.trim();
  var pw=document.getElementById('loginPwd').value.trim();
  if(!ph)return alert('请输入手机号');
  var d=await api('/auth/login',{method:'POST',data:{phone:ph,password:pw||'123456'}});
  if(!d)return;
  TOKEN=d.token;USER=d.user;
  localStorage.setItem('mp_token',TOKEN);localStorage.setItem('mp_user',JSON.stringify(USER));
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainPage').style.display='';
  document.getElementById('userArea').style.display='';
  document.getElementById('currentUser').textContent=USER.name+'（'+ROLE_MAP[USER.role]+'）';
  if(Notification&&Notification.permission==='default')Notification.requestPermission();
  renderPage();updateClock();pollNotifications();
}
function doLogout(){TOKEN='';USER=null;localStorage.clear();document.getElementById('loginPage').style.display='';document.getElementById('mainPage').style.display='none';document.getElementById('userArea').style.display='none'}
function changePwdAtLogin(){
  var ph=document.getElementById('loginPhone').value.trim();if(!ph)return alert('请先输入手机号');
  var old=prompt('请输入原密码（默认123456）：');if(old===null)return;
  var nw=prompt('请输入新密码（至少4位）：');if(!nw||nw.length<4)return alert('新密码至少4位');
  fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone:ph,password:old||'123456'})}).then(function(r){return r.json()}).then(function(d){
    if(d.code!==200)return alert('原密码错误');
    return fetch('/api/admin/change-password',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+d.data.token},body:JSON.stringify({old_pwd:old||'123456',new_pwd:nw})})
  }).then(function(r){return r.json()}).then(function(){alert('密码修改成功，请使用新密码登录')})
}
function changePassword(){
  var old=prompt('请输入原密码（默认123456）：');if(old===null)return;
  var nw=prompt('请输入新密码（至少4位）：');if(!nw||nw.length<4)return alert('新密码至少4位');
  api('/admin/change-password',{method:'POST',data:{old_pwd:old,new_pwd:nw}}).then(function(){alert('密码修改成功请重新登录');doLogout()})
}
async function downloadXLSX(url,body,filename){
  try {
    var resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+TOKEN},body:JSON.stringify(body)});
    if(!resp.ok){var t=await resp.text();if(t.startsWith('{')){var j=JSON.parse(t);alert(j.msg||'导出失败')}else{alert('导出失败')}return}
    var blob=await resp.blob();
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename+'.xlsx';document.body.appendChild(a);a.click();document.body.removeChild(a);
  }catch(e){alert('导出失败: '+e.message)}
}

// ===== 通知 =====
var NOTIF=[],NOTIF_UNREAD=0;
var NOTIF_TYPE_ICON={hazard_assigned:'⚠',hazard_completed:'✅',hazard_verified:'✅',hazard_rejected:'❌',assessment_new:'📋',quote_pending:'💰',quote_approved:'✅',quote_rejected:'❌',new_order:'🔧',order_accepted:'📦',order_urgent:'⚡',repair_completed:'✅'};
var NOTIF_LINK={hazard_assigned:'hazard',hazard_completed:'hazard',hazard_verified:'hazard',hazard_rejected:'hazard',assessment_new:'assessment'};
async function pollNotifications(){
  if(!TOKEN||!USER)return;
  try{var d=await api('/notifications');if(!d)return;NOTIF=d.list||[];NOTIF_UNREAD=d.unread||0}catch(e){}
  var badge=document.getElementById('notifyBadge');if(badge){if(NOTIF_UNREAD>0){badge.textContent=NOTIF_UNREAD>99?'99+':NOTIF_UNREAD;badge.style.display='flex'}else{badge.style.display='none'}}
}setInterval(pollNotifications,15000);
function toggleNotifPanel(){
  var p=document.getElementById('notifPanel');
  if(p.style.display==='block'){closeNotifPanel();return}
  // 动态计算位置：topbar底部 + 8px间距
  var topbar=document.querySelector('.topbar');
  var top=topbar?topbar.getBoundingClientRect().bottom+8:60;
  p.style.top=top+'px';p.style.display='block';
  var inner=p.querySelector('.notif-panel-inner');
  if(!NOTIF.length){
    inner.innerHTML='<div class="notif-empty">🔔<br>暂无通知</div>';
  }else{
    inner.innerHTML='<div class="notif-header"><b>通知</b><span style="font-size:12px;color:var(--gold)">'+NOTIF_UNREAD+'条未读</span><button class="btn btn-sm btn-o" onclick="markAllRead()">全部已读</button></div>'

  // 照片追溯

    h += '<div style="margin-top:10px"><b>📸 现场照片：</b></div><div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">';

function showQuiz(){api('/quiz/today').then(function(d){if(!d)return;if(d.done){showQuizReview(d.result)}else{startQuiz(d.questions)}})}
function startQuiz(qs){
  var i=0,answers=[],selectedOpts=[]; // selectedOpts 记录每题选中的选项索引
  var el=document.createElement('div');el.className='modal-mask';
  var catIcons={'安全操作':'🔧','安全红线':'🚫','公司制度':'📋','十大禁令':'⛔','道路交通':'🚛','高原知识':'🏔','发动机理论':'⚙','电气系统':'⚡','液压系统':'💧','变速箱':'🔗','底盘':'🛞','轮胎':'⚫','故障判断':'🔍','日常保养':'🛢','工程机械':'🏗','矿山安全':'⛏','安全基础':'📖','四受控':'🔄','八大危险作业':'⚠'};
  function showQ(){
    if(i>=qs.length){submitQuiz(answers,el);return}
    var q=qs[i],opts='',labels=['A','B','C','D'];
    try{JSON.parse(q.options).forEach(function(o,j){
      var selClass=selectedOpts[i]===j?' quiz-selected':'';
      opts+='<div class="quiz-opt'+selClass+'" id="opt'+j+'" onclick="window._selOpt('+j+')"><span class="q-opt-letter">'+labels[j]+'</span> '+o+'</div>'
    })}catch(e){}
    var barW=((i+1)/qs.length*100).toFixed(0);
    var prevBtn=i>0?'<button class="btn btn-o btn-sm" onclick="window._prevQ()">◀ 上一题</button>':'<span></span>';
    var nextLabel=i<qs.length-1?'下一题 ▶':'✓ 提交';
    el.innerHTML='<div class="modal quiz-modal" style="max-width:560px;padding:0;overflow:hidden;border-radius:14px"><div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:'+barW+'%"></div></div><div class="quiz-body"><div class="quiz-header"><span class="tag t-progress" style="font-size:11px">'+(catIcons[q.category]||'📝')+' '+q.category+'</span><span style="color:var(--text2);font-size:12px">'+(i+1)+'/'+qs.length+'</span></div><div class="quiz-question">'+q.question+'</div><div class="quiz-options">'+opts+'</div><div class="quiz-footer" style="display:flex;justify-content:space-between;align-items:center">'+prevBtn+'<button class="btn btn-p quiz-btn" onclick="window._nextQ()">'+nextLabel+'</button></div></div></div>';
    el.onclick=function(e){if(e.target===el)el.remove()};document.body.appendChild(el);
  }
  window._selOpt=function(j){
    selectedOpts[i]=j;
    document.querySelectorAll('.quiz-opt').forEach(function(o){o.classList.remove('quiz-selected')});
    var opt=document.getElementById('opt'+j);if(opt)opt.classList.add('quiz-selected');
  };
  window._nextQ=function(){
    answers[i]={question_id:qs[i].id,user_answer:selectedOpts[i]>=0?String.fromCharCode(65+selectedOpts[i]):''};
    i++;showQ();
  };
  window._prevQ=function(){
    // 保存当前题的选择
    answers[i]={question_id:qs[i].id,user_answer:selectedOpts[i]>=0?String.fromCharCode(65+selectedOpts[i]):''};
    if(i>0){i--;showQ()}
  };
  showQ();
}
function submitQuiz(as,el){api('/quiz/submit',{method:'POST',data:{answers:as}}).then(function(r){
  el.remove();
  var pct=Math.round(r.score/r.total*100),emoji=pct===100?'🌟':pct>=80?'🎉':pct>=60?'👍':'💪',bg=pct===100?'linear-gradient(135deg,#c8a04a,#b87333)':pct>=80?'linear-gradient(135deg,#4a8f5a,#3d7349)':pct>=60?'linear-gradient(135deg,#1677ff,#0958d9)':'linear-gradient(135deg,#c0392b,#96281b)';
  var re=document.createElement('div');re.className='modal-mask';
  re.innerHTML='<div class="modal" style="max-width:400px;text-align:center;padding:0;overflow:hidden;border-radius:14px"><div style="background:'+bg+';padding:30px 20px"><div style="font-size:48px">'+emoji+'</div><div style="font-size:42px;font-weight:900;color:#fff;margin:8px 0">'+r.score+'<span style="font-size:20px">/'+r.total+'</span></div><div style="color:rgba(255,255,255,.8);font-size:14px">正确率 '+pct+'%</div></div><div style="padding:20px"><button class="btn btn-p" onclick="this.closest(\'.modal-mask\').remove();showLeaderboard()">🏆 查看排行榜</button><br><button class="btn btn-o btn-sm" style="margin-top:8px" onclick="this.closest(\'.modal-mask\').remove()">关闭</button></div></div>';
  re.onclick=function(e){if(e.target===re)re.remove()};document.body.appendChild(re)
})}
// 回顾已答题目
function showQuizReview(result){
  var pct=Math.round(result.score/result.total*100),emoji=pct===100?'🌟':pct>=80?'🎉':pct>=60?'👍':'💪',bg=pct===100?'linear-gradient(135deg,#c8a04a,#b87333)':pct>=80?'linear-gradient(135deg,#4a8f5a,#3d7349)':pct>=60?'linear-gradient(135deg,#1677ff,#0958d9)':'linear-gradient(135deg,#c0392b,#96281b)';
  var items='',labels=['A','B','C','D'];
  try{
    var pastAnswers=JSON.parse(result.answers||'[]');
    pastAnswers.forEach(function(a,j){
      var userLabel=a.user_answer||'未答';
      var correctLabel=a.correct_answer;
      var isCorrect=a.correct;
      items+='<div style="padding:12px;margin-bottom:8px;background:'+(isCorrect?'rgba(90,158,95,.06)':'rgba(224,85,85,.06)')+';border-radius:8px;border-left:3px solid '+(isCorrect?'var(--success)':'var(--danger)')+'">'+
        '<div style="font-weight:600;margin-bottom:6px">'+(j+1)+'. '+a.question+'</div>'+
        '<div>你的答案：<b style="color:'+(isCorrect?'var(--success)':'var(--danger)')+'">'+(a.user_answer||'未答')+(userLabel!=='未答'?' . '+labels[userLabel.charCodeAt(0)-65]:'')+'</b></div>'+
        (!isCorrect?'<div>正确答案：<b style="color:var(--success)">'+correctLabel+' . '+labels[correctLabel.charCodeAt(0)-65]+'</b></div>':'')+
        (a.explanation?'<div style="margin-top:4px;color:var(--text2);font-size:12px">💡 '+a.explanation+'</div>':'')+
      '</div>';
    });
  }catch(e){items='<div class="empty">暂无答题记录</div>'}
  var re=document.createElement('div');re.className='modal-mask';

  re.onclick=function(e){if(e.target===re)re.remove()};document.body.appendChild(re)
}
function showLeaderboard(){api('/quiz/leaderboard').then(function(d){if(!d)return;var rows='';(d.leaderboard||[]).forEach(function(r,i){var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';var likedClass=r.liked_by_me?'liked':'';rows+='<tr><td>'+medal+' '+(i+1)+'</td><td>'+r.name+'</td><td>'+r.total_score+'分</td><td>'+r.days+'天</td><td><button class="btn btn-sm like-btn '+likedClass+'" onclick="toggleQuizLike('+r.user_id+',this)" title="'+(r.liked_by_me?'已点赞':'点赞')+'">👍 '+(r.likes||0)+'</button></td></tr>'});showModal('🏆 本月排行榜','<table><tr><th>排名</th><th>姓名</th><th>总分</th><th>天数</th><th>点赞</th></tr>'+rows+'</table>')})}

// 档案列表（卡片网格）
async function showVehicleArchiveList() {
  var res = await api('/vehicle-archives/list');
  var list = res.data || [];
  if (!list.length) {
    showModal('在编车辆档案',
      '<div class="empty" style="padding:40px;text-align:center">暂无在编车辆档案</div>' +
      ((USER.role === 'admin' || USER.role === 'dispatcher')
        ? '<div style="text-align:center;margin-top:12px"><button class="btn btn-p" onclick="showVehicleArchiveForm()">+ 添加车辆档案</button></div>'
        : '')
    );
    return;
  }

  var cards = '';
  list.forEach(function(v) {
    var photos = [];
    try { photos = JSON.parse(v.photos || '[]'); } catch(e) { photos = []; }
    var thumb = photos.length > 0
      ? '<img src="' + photos[0] + '" style="width:100%;height:140px;object-fit:cover;border-radius:8px 8px 0 0" />'
      : '<div style="width:100%;height:140px;background:var(--surface2);border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--border)">🚛</div>';

    var curH = Number(v.current_hours) || 0;
    var next = Number(v.next_maintenance_hours) || 0;
    var remain = curH && next ? next - curH : 999;
    var maintSt, maintCls;
    if (!next) { maintSt = '未设置'; maintCls = 't-done'; }
    else if (remain < 0) { maintSt = '保养过期'; maintCls = 't-reject'; }
    else if (remain <= 50) { maintSt = '即将保养'; maintCls = 't-pending'; }
    else { maintSt = '正常'; maintCls = 't-done'; }

    // 公里保养状态
    var curKm = Number(v.current_km) || 0;
    var nextKm = Number(v.next_maintenance_km) || 0;
    var remainKm = curKm && nextKm ? nextKm - curKm : 999;
    var kmSt = '';
    if (nextKm > 0) {
      kmSt = remainKm < 0 ? ' <span class="tag t-reject" style="font-size:10px">km过期</span>' :
             remainKm <= 500 ? ' <span class="tag t-pending" style="font-size:10px">km即将</span>' : '';
    }

    // 底部显示：工时或公里（优先显示设置了保养的那个）
    var bottomInfo = '';
    if (next > 0) {
      bottomInfo = '<span style="color:var(--text2)">工时: ' + curH + 'h</span><span class="tag ' + maintCls + '">' + maintSt + '</span>';
    }
    if (nextKm > 0) {
      bottomInfo = (bottomInfo ? bottomInfo + ' ' : '') + '<span style="color:var(--text2)">km: ' + curKm + '</span>' + kmSt;
    }
    if (!bottomInfo) {
      bottomInfo = '<span style="color:var(--text2)">工时: ' + curH + 'h</span><span class="tag t-done">未设置</span>';
    }

    cards += '<div class="card" style="padding:0;cursor:pointer;overflow:hidden;transition:transform .2s" onmouseenter="this.style.transform=\'translateY(-4px)\'" onmouseleave="this.style.transform=\'\'" onclick="showVehicleArchiveDetail(\'' + v.plate_number + '\')">' +
      thumb +
      '<div style="padding:14px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:18px;font-weight:700;color:var(--text)">' + v.plate_number + '</span>' + (v.department && v.department !== '总调度室' ? '<span style="font-size:10px;background:#f0f0f0;color:#666;padding:2px 6px;border-radius:4px">' + v.department + '</span>' : '') + '</div>' +
        '<div style="font-size:13px;color:var(--text2);margin-top:4px">' + (v.vehicle_type || '-') + ' / ' + (v.model || '-') + '</div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:12px">' +
          bottomInfo +
        '</div>' +
        (v.driver_name ? '<div style="font-size:11px;color:var(--text2);margin-top:4px">驾驶员: ' + v.driver_name + '</div>' : '') +
      '</div></div>';
  });

  var addBtn = (USER.role === 'admin' || USER.role === 'dispatcher')
    ? '<div style="margin-bottom:16px"><button class="btn btn-p" onclick="showVehicleArchiveForm()">+ 添加车辆档案</button></div>'
    : '';

  showModal('在编车辆档案 (' + list.length + '辆)',
    addBtn + '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;max-height:70vh;overflow:auto">' + cards + '</div>'
  );
}

// 照片滑动
function vaSlide(dir) {
  var photos = window._vaPhotos || [];
  if (!photos.length) return;
  var imgs = document.querySelectorAll('#vaDetailPhotos img');
  var current = 0;
  imgs.forEach(function(img, i) {
    if (img.style.opacity === '1') current = i;
  });
  var next = (current + dir + photos.length) % photos.length;
  vaSlideTo(next);
}
function vaSlideTo(idx) {
  var imgs = document.querySelectorAll('#vaDetailPhotos img');
  var dots = document.querySelectorAll('.va-dot');
  imgs.forEach(function(img, i) {
    img.style.opacity = i === idx ? '1' : '0';
    img.style.pointerEvents = i === idx ? 'auto' : 'none';
  });
  dots.forEach(function(d, i) {
    d.style.background = i === idx ? '#fff' : 'rgba(255,255,255,.4)';
  });
}

// 录入/编辑表单
function showVehicleArchiveForm(plate) {
  var isEdit = !!plate;
  var title = isEdit ? '编辑车辆档案 — ' + plate : '添加在编车辆档案';

  if (isEdit) {
    api('/vehicle-archives/' + plate).then(function(res) {
      var v = res.data;
      if (!v) { toast('档案不存在'); return; }
      renderForm(title, v);
    });
  } else {
    renderForm(title, null);
  }
}

function renderForm(title, v) {
  var isEdit = !!v;
  var plateDisabled = isEdit ? 'disabled' : '';
  var plateVal = isEdit ? v.plate_number : '';
  var deptVal = isEdit ? (v.department || '总调度室') : '总调度室';
  var typeVal = isEdit ? (v.vehicle_type || '') : '';
  var modelVal = isEdit ? (v.model || '') : '';
  var pdateVal = isEdit ? (v.purchase_date || '') : '';
  var mdateVal = isEdit ? (v.manufacture_date || '') : '';
  var vinVal = isEdit ? (v.vin || '') : '';
  var insVal = isEdit ? (v.insurance_expiry || '') : '';
  var inspVal = isEdit ? (v.inspection_date || '') : '';
  var intervVal = isEdit ? (v.maintenance_interval || 500) : 500;
  var nextVal = isEdit ? (v.next_maintenance_hours || 0) : 0;
  var intervKmVal = isEdit ? (v.maintenance_interval_km || 0) : 0;
  var nextKmVal = isEdit ? (v.next_maintenance_km || 0) : 0;
  var curKmVal = isEdit ? (v.current_km || 0) : 0;
  var deptZS = deptVal === '总调度室' ? 'selected' : '';
  var deptHJ = deptVal === '西藏恒骏' ? 'selected' : '';
  var bmYes = isEdit && v.has_behavior_monitor ? 'selected' : '';
  var bmNo = isEdit && !v.has_behavior_monitor ? 'selected' : '';
  var camYes = isEdit && v.has_360_camera ? 'selected' : '';
  var camNo = isEdit && !v.has_360_camera ? 'selected' : '';

  // 当前照片预览
  var photos = [];
  try { if (isEdit) photos = JSON.parse(v.photos || '[]'); } catch(e) { photos = []; }
  var photoPreviewHtml = '<div id="vaPhotoPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">' +
    photos.map(function(url) {
      return '<div style="position:relative"><img src="' + url + '" style="width:80px;height:80px;object-fit:cover;border-radius:6px" /><span style="position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px" onclick="vaRemovePhoto(\'' + url + '\')">✕</span></div>';

    '<div class="form-group"><label>所属部门 <span style="color:var(--danger)">*</span></label><select id="vaDept"><option value="总调度室" ' + deptZS + '>总调度室</option><option value="西藏恒骏" ' + deptHJ + '>西藏恒骏</option></select></div>' +
    '<div class="row2"><div class="form-group"><label>类型</label><input id="vaType" value="' + typeVal + '" placeholder="如：履带挖掘机" /></div><div class="form-group"><label>具体型号</label><input id="vaModel" value="' + modelVal + '" placeholder="如：CAT 390D" /></div></div>' +
    '<div class="row2"><div class="form-group"><label>出厂日期</label><input id="vaMdate" type="date" value="' + mdateVal + '" /></div><div class="form-group"><label>购买日期</label><input id="vaPdate" type="date" value="' + pdateVal + '" /></div></div>' +
    '<div class="row2"><div class="form-group"><label>车辆识别代码(VIN)</label><input id="vaVin" value="' + vinVal + '" placeholder="VIN码" /></div><div class="form-group"><label>保险到期日</label><input id="vaIns" type="date" value="' + insVal + '" /></div></div>' +
    '<div class="form-group"><label>年检日期</label><input id="vaInsp" type="date" value="' + inspVal + '" /></div>' +
    '<div class="row2"><div class="form-group"><label>保养间隔(h)</label><input id="vaInterval" type="number" value="' + intervVal + '" /></div><div class="form-group"><label>下次保养工时(h)</label><input id="vaNextMaint" type="number" value="' + nextVal + '" /></div></div>' +

    '<div class="row2"><div class="form-group"><label>保养间隔(km)</label><input id="vaIntervalKm" type="number" value="' + intervKmVal + '" placeholder="如：10000" /></div><div class="form-group"><label>下次保养公里(km)</label><input id="vaNextMaintKm" type="number" value="' + nextKmVal + '" /></div></div>' +
    '<div class="row2"><div class="form-group"><label>当前公里数(km)</label><input id="vaCurKm" type="number" value="' + curKmVal + '" /></div><div class="form-group"></div></div>' +
    '<div class="row2">' +
      '<div class="form-group"><label>行为监控</label><select id="vaBM"><option value="1" ' + bmYes + '>有</option><option value="0" ' + bmNo + '>无</option></select></div>' +

        showVehicleArchiveList();

// 选择照片（用于档案表单）
function vaPickPhotos() {
  window.pickPhotos(function(urls) {
    window._vaNewPhotos = (window._vaNewPhotos || []).concat(urls);
    var container = document.getElementById('vaPhotoPreview');
    if (!container) return;
    urls.forEach(function(url) {
      var div = document.createElement('div');

// 移除照片
function vaRemovePhoto(url) {
  window._vaNewPhotos = (window._vaNewPhotos || []).filter(function(u) { return u !== url; });
  var container = document.getElementById('vaPhotoPreview');
  if (!container) return;
  var imgs = container.querySelectorAll('img');
  imgs.forEach(function(img) {
    if (img.src === url) {
      var wrapper = img.parentElement;
      if (wrapper) wrapper.remove();
    }
  });
}

// 保养完成（工时）
async function maintenanceDoneVehicle(plate) {
  if (!confirm('确认车辆 "' + plate + '" 已完成保养？\n下次保养工时将自动增加保养间隔。')) return;
  var res = await api('/vehicle-archives/' + plate + '/maintenance-done', { method: 'POST' });
  if (res && res.code === 200) {
    toast(res.msg);
    document.querySelectorAll('.modal-mask').forEach(function(m) { m.remove(); });
    showVehicleArchiveDetail(plate);
  } else {
    toast(res && res.msg || '操作失败');
  }
}

async function loadDriverData(today,month){
  try{
    var [allVehicles,orders,inspRecords]=await Promise.all([api('/vehicles'),api('/repair/my-orders'),api('/inspection/my-records?month='+month)]);
    var todayInsp=(inspRecords||[]).filter(function(r){return r.inspection_date===today});
    var recentOrders=(orders||[]).slice(0,4);
    var activeOrders=(orders||[]).filter(function(o){return['pending_accept','pending_quote','pending_approval','approved','repairing'].indexOf(o.status)>=0});
    var pendingAccept=(orders||[]).filter(function(o){return o.status==='completed'});
    document.getElementById('dashStats').innerHTML=
      '<div class="stat-item" onclick="showVehiclesByStatus(\'\',\'所有车辆\')" style="cursor:pointer"><div class="stat-num">'+(allVehicles||[]).length+'</div><div class="stat-label">总车辆</div></div>'+
      '<div class="stat-item"><div class="stat-num">'+activeOrders.length+'</div><div class="stat-label">进行中工单</div></div>'+
      '<div class="stat-item"><div class="stat-num" style="color:'+(todayInsp.length?'var(--success)':'var(--danger)')+'">'+(todayInsp.length?'已完成':'未提交')+'</div><div class="stat-label">今日点检</div></div>'+
      '<div class="stat-item" onclick="showPartsRequisition()" style="cursor:pointer"><div class="stat-num" style="color:var(--primary)">🔧</div><div class="stat-label">配件领用</div></div>'+
      '<div class="stat-item" onclick="showQuiz()" style="cursor:pointer"><div class="stat-num" style="color:var(--gold)">📝</div><div class="stat-label">每日一测</div></div>';
    document.getElementById('recentOrders').innerHTML=recentOrders.length?recentOrders.map(function(o){return '<div style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="showOrderDetail('+o.id+')"><div class="flex"><span class="order-no">'+o.order_no+'</span><span class="tag '+ST_TAG[o.status]+'">'+STATUS_MAP[o.status]+'</span></div><div style="font-size:11px;color:var(--text2);margin-top:4px">'+o.plate_number+' | '+o.created_at+'</div></div>'}).join(''):'<div class="empty">暂无工单</div>';
    document.getElementById('todayCheck').innerHTML=
      '<div style="display:flex;gap:8px;margin-bottom:10px"><button class="btn btn-p btn-sm" onclick="showInspection(\'morning\')">☀ 早检</button><button class="btn btn-o btn-sm" onclick="showInspection(\'evening\')">🌙 晚检</button></div>'+
      (todayInsp.length?todayInsp.map(function(r){return '<div style="padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="showInspectionDetail('+r.id+')"><span style="font-weight:500">'+r.plate_number+'</span> <span class="tag '+(r.overall_status==='normal'?'t-done':'t-reject')+'">'+(r.overall_status==='normal'?'正常':'异常')+'</span>'+'<br><span style="font-size:11px;color:var(--text2)">油位:'+(LEVEL_MAP[r.oil_level]||'-')+' / 水位:'+(LEVEL_MAP[r.coolant_level]||'-')+' / 九样:'+(r.toolkit_check==='ok'?'✅':'❌')+'</span>'+((r.start_hours||r.fuel_amount)?'<br><span style="font-size:11px;color:var(--text2)">工时:'+(r.start_hours||0)+'h→'+(r.end_hours||0)+'h 加油:'+(r.fuel_amount||0)+'L 停车:'+(r.parking_location||'-')+'</span>':'')+'</div>'}).join(''):'<div class="empty">今日暂无点检记录</div>');
    var vsHtml='<table><tr><th>内部编号</th><th>类型</th><th>型号</th><th>当前工时</th><th>下次保养</th><th>状态</th></tr>';
    (allVehicles||[]).filter(function(v){return v.archive_department!=='西藏恒骏'}).forEach(function(v){
      var curH=v.archive_current_hours||v.latest_end_hours||0;
      var next=v.archive_next_maintenance||v.next_maintenance_hours||0;
      var remain=curH&&next?next-curH:999;
      var st=remain<0?'<span class="tag t-reject">过期</span>':remain<50?'<span class="tag t-pending">即将保养</span>':'<span class="tag t-done">正常</span>';
      vsHtml+='<tr><td><b>'+v.plate_number+'</b></td><td>'+(v.vehicle_type||'-')+'</td><td>'+(v.model||'-')+'</td><td>'+curH+'h</td><td>'+next+'h</td><td>'+st+'</td></tr>'
    });

function actionBtns(o){
  var b='<button class="btn btn-sm btn-p" onclick="showOrderDetail('+o.id+')">详情</button>';

    if (!name) { alert('请填写申请人姓名'); return false; }
    if (!phone) { alert('请填写申请人电话'); return false; }
    if (!loc) { alert('请填写作业地点'); return false; }
    if (!purpose) { alert('请填写作业用途'); return false; }

    var schedStart, schedEnd;
    if (appType === 'long_term') {
      schedStart = document.getElementById('maStartDT').value;
      schedEnd = document.getElementById('maEndDT').value;
      if (!schedStart || !schedEnd) { alert('请选择起止日期时间'); return false; }
      schedStart = schedStart.replace('T', ' ');
      schedEnd = schedEnd.replace('T', ' ');
    } else {
      var d = document.getElementById('maDate').value;
      if (!d) { alert('请选择用车日期'); return false; }
      var st = document.getElementById('maStartTime').value;
      var et = document.getElementById('maEndTime').value;
      if (!st || !et) { alert('请选择开始和结束时间'); return false; }
      schedStart = d + ' ' + st;
      schedEnd = d + ' ' + et;
    }

    var briefingMethod = '', briefingFiles = '[]';
    if (hazardous === '1') {
      var mr = document.querySelector('input[name="briefingMethod"]:checked');
      briefingMethod = mr ? mr.value : '';
      var fi = document.getElementById('briefingFiles');
      if (fi && fi.files.length > 0 && briefingMethod === 'attachment') {
        var urls = await uploadMultipleFiles(fi.files);
        briefingFiles = JSON.stringify(urls);
      }
    }

    await api('/machinery/apply', { method: 'POST', data: {
      applicant_dept: dept, applicant_name: name, applicant_phone: phone,
      vehicle_type: vtype, application_type: appType,
      scheduled_start: schedStart, scheduled_end: schedEnd,
      work_location: loc, work_altitude: altitude, work_purpose: purpose,
      is_hazardous: hazardous === '1', urgency: urg,
      briefing_method: briefingMethod, briefing_files: briefingFiles
    }});
    toast('申请已提交');
    mask.remove();
    renderPage();
  });
}

// 上传多文件辅助函数
async function uploadMultipleFiles(files) {
  var urls = [];
  for (var i = 0; i < files.length; i++) {
    var fd = new FormData();
    fd.append('file', files[i]);
    var r = await fetch(API + '/upload/single', { method: 'POST', headers: { 'Authorization': 'Bearer ' + TOKEN }, body: fd });
    var d = await r.json();
    if (d.code === 200 && d.data) urls.push(d.data.url);
  }
  return urls;
}

function selectBriefingPill(method) {
  // Update hidden radios
  var radios = document.querySelectorAll('input[name="briefingMethod"]');
  radios.forEach(function(r) { r.checked = (r.value === method); });
  // Update pill styles
  document.querySelectorAll('.radio-pill').forEach(function(p) { p.classList.remove('active'); });
  var targetPill = document.getElementById(method === 'attachment' ? 'pillAttachment' : 'pillOnsite');
  if (targetPill) targetPill.classList.add('active');
  // Toggle upload area
  toggleBriefingUpload();
}
function toggleBriefingUpload() {
  var radio = document.querySelector('input[name="briefingMethod"]:checked');
  var area = document.getElementById('briefingUploadArea');
  if (area) area.style.display = radio && radio.value === 'attachment' ? 'block' : 'none';
}
function previewBriefingFiles() {
  var files = document.getElementById('briefingFiles').files;
  var preview = document.getElementById('briefingPreview');
  if (!preview) return;
  preview.innerHTML = '';
  for (var i = 0; i < files.length; i++) {
    (function(file) {
      if (file.type.startsWith('image/')) {
        var reader = new FileReader();
        reader.onload = function(e) {
          preview.innerHTML += '<div style="width:80px;height:80px;overflow:hidden;border-radius:4px;border:1px solid var(--border)"><img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover" title="'+file.name+'" /></div>';
        };
        reader.readAsDataURL(file);
      } else {
        preview.innerHTML += '<div style="width:80px;height:80px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--border);font-size:12px;text-align:center">📄 '+file.name+'</div>';
      }
    })(files[i]);
  }
}

// ==================== 调度员：待指派列表 ====================
function showPendingAssignments() {
  Promise.all([api('/machinery/pending-list'), api('/vehicles'), api('/admin/users?role=driver')]).then(function(r) {
    var result = r[0];
    var pending = (result && result.list) || (Array.isArray(result) ? result : []);
    var stats = (result && result.stats) || null;
    var vehicles = r[1] || [], drivers = r[2] || [];
    if (!pending.length) return alert('暂无待指派申请');

    // 计算长期车辆（申请时长>2天）
    function isLongTerm(item) {
      if (!item.scheduled_start || !item.scheduled_end) return false;
      var start = new Date(item.scheduled_start.replace(' ','T'));
      var end = new Date(item.scheduled_end.replace(' ','T'));
      return (end - start) > 2 * 24 * 60 * 60 * 1000;
    }

    // 收集所有车型 + 长期车辆选项
    var typeSet = {};
    var hasLongTerm = false;
    pending.forEach(function(item) {
      if (item.vehicle_type) typeSet[item.vehicle_type] = (typeSet[item.vehicle_type]||0)+1;
      if (isLongTerm(item)) hasLongTerm = true;
    });
    var types = Object.keys(typeSet).sort();

    // 构建筛选下拉
    var filterOpts = '<option value="__all__">全部申请 ('+pending.length+')</option>';
    types.forEach(function(t) {
      filterOpts += '<option value="'+t.replace(/"/g,'&quot;')+'">'+t+' ('+typeSet[t]+')</option>';
    });
    if (hasLongTerm) {
      var ltCount = pending.filter(function(item){return isLongTerm(item);}).length;
      filterOpts += '<option value="__long_term__">长期车辆 ('+ltCount+')</option>';
    }

    // 统计栏
    var statsBar = '';
    if (stats) {
      statsBar = '<div style="display:flex;gap:16px;padding:10px 14px;background:var(--bg);border-radius:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap">'+
        '<span>🚛 剩余可派车辆：<b style="color:'+(stats.availableVehicles>0?'var(--success)':'var(--danger)')+'">'+stats.availableVehicles+'</b>/'+stats.totalVehicles+' 台</span>'+
        '<span>👤 剩余驾驶员：<b style="color:'+(stats.availableDrivers>0?'var(--success)':'var(--danger)')+'">'+stats.availableDrivers+'</b>/'+stats.totalDrivers+' 人</span>'+
        '</div>';
    }

    // 渲染表格行的函数
    function renderRows(filtered) {
      var rows = '';
      filtered.forEach(function(item) {
        var ht = Number(item.is_hazardous) ? '<span class="tag t-reject">危险</span> ' : '';
        var ltTag = isLongTerm(item) ? ' <span class="tag t-pending">长期</span>' : '';
        var vtypeDisplay = item.vehicle_type ? '<span style="color:var(--primary);font-weight:600">'+item.vehicle_type+'</span>' : '<span style="color:var(--text2)">未指定</span>';
        rows += '<tr><td class="order-no">'+item.application_no+'</td><td><span class="tag">'+(MA_TYPE_MAP[item.application_type]||'短期')+'</span>'+ltTag+'</td><td>'+vtypeDisplay+'</td><td><b>'+item.applicant_dept+'</b></td><td>'+item.applicant_name+'<br><span style="font-size:11px">'+item.applicant_phone+'</span></td><td>'+(item.scheduled_start||'').replace(' ','<br>')+'-'+(item.scheduled_end||'').replace(' ','<br>')+'</td><td>'+item.work_location+'</td><td>'+ht+'<span class="tag '+(item.urgency==='emergency'?'t-reject':'t-pending')+'">'+MA_URG_MAP[item.urgency]+'</span></td><td><button class="btn btn-sm btn-p" onclick="showAssignForm('+item.id+')">指派</button> <button class="btn btn-sm btn-s" onclick="showMachineryDetail('+item.id+')">详情</button></td></tr>';
      });
      return rows;
    }

    window._maVehicles = vehicles;
    window._maDrivers = drivers;
    window._maPending = pending;

    var modalContent = statsBar +
      '<div style="margin-bottom:10px;display:flex;align-items:center;gap:8px">'+
        '<span style="font-size:13px;white-space:nowrap">🔍 筛选：</span>'+
        '<select id="pendingVTypeFilter" onchange="filterPendingByType()" style="font-size:13px;max-width:280px">'+filterOpts+'</select>'+
        '<span id="pendingFilterCount" style="font-size:12px;color:var(--text2)"></span>'+
      '</div>'+
      '<div id="pendingTableWrap"><table><tr><th>编号</th><th>类型</th><th>所需车型</th><th>部门</th><th>申请人</th><th>时段</th><th>地点</th><th>标签</th><th>操作</th></tr>'+renderRows(pending)+'</table></div>';

    showModal('📋 待指派用车申请', modalContent);
  });
}

// 筛选待指派列表
function filterPendingByType() {
  var sel = document.getElementById('pendingVTypeFilter');
  var countEl = document.getElementById('pendingFilterCount');
  var wrap = document.getElementById('pendingTableWrap');
  if (!sel || !wrap) return;
  var val = sel.value;
  var pending = window._maPending || [];

  var filtered;
  if (val === '__all__') {
    filtered = pending;
  } else if (val === '__long_term__') {
    filtered = pending.filter(function(item) {
      if (!item.scheduled_start || !item.scheduled_end) return false;
      var start = new Date(item.scheduled_start.replace(' ','T'));
      var end = new Date(item.scheduled_end.replace(' ','T'));
      return (end - start) > 2 * 24 * 60 * 60 * 1000;
    });
  } else {
    filtered = pending.filter(function(item) { return item.vehicle_type === val; });
  }

  var rows = '';
  filtered.forEach(function(item) {
    var ht = Number(item.is_hazardous) ? '<span class="tag t-reject">危险</span> ' : '';
    function isLT(it) {
      if (!it.scheduled_start || !it.scheduled_end) return false;
      return (new Date(it.scheduled_end.replace(' ','T')) - new Date(it.scheduled_start.replace(' ','T'))) > 2*24*60*60*1000;
    }
    var ltTag = isLT(item) ? ' <span class="tag t-pending">长期</span>' : '';
    var vtypeDisplay = item.vehicle_type ? '<span style="color:var(--primary);font-weight:600">'+item.vehicle_type+'</span>' : '<span style="color:var(--text2)">未指定</span>';
    rows += '<tr><td class="order-no">'+item.application_no+'</td><td><span class="tag">'+(MA_TYPE_MAP[item.application_type]||'短期')+'</span>'+ltTag+'</td><td>'+vtypeDisplay+'</td><td><b>'+item.applicant_dept+'</b></td><td>'+item.applicant_name+'<br><span style="font-size:11px">'+item.applicant_phone+'</span></td><td>'+(item.scheduled_start||'').replace(' ','<br>')+'-'+(item.scheduled_end||'').replace(' ','<br>')+'</td><td>'+item.work_location+'</td><td>'+ht+'<span class="tag '+(item.urgency==='emergency'?'t-reject':'t-pending')+'">'+MA_URG_MAP[item.urgency]+'</span></td><td><button class="btn btn-sm btn-p" onclick="showAssignForm('+item.id+')">指派</button> <button class="btn btn-sm btn-s" onclick="showMachineryDetail('+item.id+')">详情</button></td></tr>';
  });

  wrap.innerHTML = filtered.length
    ? '<table><tr><th>编号</th><th>类型</th><th>所需车型</th><th>部门</th><th>申请人</th><th>时段</th><th>地点</th><th>标签</th><th>操作</th></tr>'+rows+'</table>'
    : '<div class="empty">该筛选项下暂无待指派申请</div>';
  if (countEl) countEl.textContent = '共 '+filtered.length+' 条';
}

// ==================== 调度员：指派表单 ====================
function showAssignForm(id) {
  var vehicles = window._maVehicles || [];
  var drivers = window._maDrivers || [];
  var pending = window._maPending || [];

  // 查找对应申请
  var app = null;
  for (var i = 0; i < pending.length; i++) {
    if (pending[i].id === id) { app = pending[i]; break; }
  }
  if (!app) { alert('申请数据丢失，请返回重试'); return; }

  if (!vehicles.length) return alert('请先录入车辆');
  if (!drivers.length) return alert('暂无可用驾驶员');

  // 按车型匹配排序：完全匹配 → 部分匹配 → 其他
  var reqType = (app.vehicle_type || '').toLowerCase();
  var scored = vehicles.map(function(v) {
    var vt = (v.vehicle_type || '').toLowerCase();
    var score = 0;
    if (reqType && vt === reqType) score = 3;
    else if (reqType && vt.indexOf(reqType) >= 0) score = 2;
    else if (reqType && reqType.indexOf(vt) >= 0) score = 1;
    return { v: v, score: score };
  });
  scored.sort(function(a, b) { return b.score - a.score; });

  var vOpts = scored.map(function(s) {
    var v = s.v;
    var matchBadge = s.score >= 3 ? ' ✅ 车型匹配' : s.score >= 2 ? ' 🔶 部分匹配' : '';
    return '<option value="'+v.id+'"'+(s.score >= 3 ? ' style="color:var(--success);font-weight:600"' : '')+'>'+v.plate_number+'（'+v.vehicle_type+' '+v.model+'） ¥'+(v.hourly_rate||0)+'/h'+matchBadge+'</option>';
  }).join('');

  var dOpts = drivers.map(function(d) { return '<option value="'+d.id+'">'+d.name+'（'+d.phone+'）</option>'; }).join('');

  // 申请摘要卡片
  var summaryHtml = '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;line-height:1.8">'+
    '<div style="font-weight:700;color:var(--gold-light);margin-bottom:6px;font-size:14px">'+app.application_no+' — '+(MA_TYPE_MAP[app.application_type]||'短期')+'用车</div>'+
    '<div><b>所需车型：</b><span style="color:var(--primary);font-weight:600;font-size:15px">'+(app.vehicle_type || '未指定')+'</span></div>'+
    '<div><b>申请部门：</b>'+app.applicant_dept+' | <b>申请人：</b>'+app.applicant_name+' | <b>电话：</b>'+app.applicant_phone+'</div>'+
    '<div><b>用车时段：</b>'+(app.scheduled_start||'')+' — '+(app.scheduled_end||'')+'</div>'+
    '<div><b>作业地点：</b>'+app.work_location+(app.work_altitude ? ' ('+app.work_altitude+')' : '')+'</div>'+
    '<div><b>作业用途：</b>'+app.work_purpose+'</div>'+
    '<div><b>紧急程度：</b><span class="tag '+(app.urgency==='emergency'?'t-reject':app.urgency==='urgent'?'t-pending':'')+'">'+MA_URG_MAP[app.urgency]+'</span>'+
      (Number(app.is_hazardous) ? ' <span class="tag t-reject">危险作业</span>' : '')+
      (app.briefing_method ? ' | <b>交底方式：</b>'+(app.briefing_method==='attachment'?'附件交底':'现场交底') : '')+
    '</div>'+
  '</div>';

  // 统计匹配数量
  var matchCount = scored.filter(function(s) { return s.score >= 3; }).length;
  if (matchCount === 0) {
    summaryHtml += '<div style="padding:10px;background:rgba(212,160,23,.1);border:1px solid var(--warning);border-radius:6px;margin-bottom:14px;font-size:13px;color:var(--warning)">⚠ 警告：车辆列表中没有与所需车型 <b>"'+app.vehicle_type+'"</b> 完全匹配的车辆，请核实或指派近似车型。</div>';
  }

  showModal('🚛 指派车辆 — '+app.application_no,
    summaryHtml +
    '<div class="form-group"><label>选择车辆 <span style="font-size:11px;color:var(--text2)">（✅ 车型匹配优先）</span></label><select id="assignVehicle" style="font-size:13px">'+vOpts+'</select></div>'+
    '<div class="form-group"><label>选择驾驶员</label><select id="assignDriver">'+dOpts+'</select></div>',
    async function(mask) {
      var vid = parseInt(document.getElementById('assignVehicle').value);
      var did = parseInt(document.getElementById('assignDriver').value);
      if (!vid || !did) { alert('请选择车辆和驾驶员'); return false; }
      var result = await api('/machinery/assign/'+id, { method: 'POST', data: { assigned_vehicle_id: vid, assigned_driver_id: did }});
      if (!result) return false; // api 失败时已弹错误提示，不继续
      toast('派车成功！已通知驾驶员和申请方');
      mask.remove();
      document.querySelectorAll('.modal-mask').forEach(function(m) { m.remove(); });
      renderPage();
    }
  );
}

function showDriverTasks() {

    if (!data || !data.length) return showModal('🚛 派车任务', '<div class="empty">暂无进行中的派车任务</div>');

        '<div style="margin-top:8px;font-size:13px">'+
          '<div><b>申请人所需车型：</b><span style="color:var(--gold-light);font-weight:600">'+(item.vehicle_type || '-')+'</span></div>'+
          '<div><b>指派车辆/型号：</b><span style="color:var(--primary)">'+item.assigned_vehicle_type+' '+item.assigned_vehicle_model+'</span></div>'+
          '<div><b>服务部门：</b>'+item.applicant_dept+'</div>'+
          '<div><b>作业时段：</b>'+(item.scheduled_start||'')+' — '+(item.scheduled_end||'')+'</div>'+
          '<div><b>作业地点：</b>'+item.work_location+(item.work_altitude ? ' ('+item.work_altitude+')' : '')+'</div>'+
          '<div><b>作业用途：</b>'+item.work_purpose+'</div>'+
          '<div><b>申请人：</b>'+item.applicant_name+' 📞 <a href="tel:'+item.applicant_phone+'">'+item.applicant_phone+'</a></div>'+
          (item.briefing_files && item.briefing_files !== '[]' ? renderBriefingFiles(item.briefing_files) : '')+
        '</div></div>';
    }).join('');

    showModal('🚛 我的派车任务 ('+data.length+'条)', cards);
  });
}

function renderBriefingFiles(filesJson) {
  try {
    var files = JSON.parse(filesJson);
    if (!files.length) return '';
    // 收集所有图片URL用于查看器
    var imgUrls = files.filter(function(u) { return /\.(jpg|jpeg|png|gif|webp)/i.test(u); });
    var h = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">';
    files.forEach(function(url) {
      if (/\.(jpg|jpeg|png|gif|webp)/i.test(url)) {
        var idx = imgUrls.indexOf(url);
        h += '<img src="'+url+'" style="width:60px;height:60px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid var(--border)" onclick="event.stopPropagation();showFaultPhotos('+JSON.stringify(imgUrls)+','+idx+')" />';
      } else {
        h += '<a href="'+url+'" target="_blank" style="font-size:11px;padding:4px 8px;background:var(--bg);border-radius:4px;text-decoration:none;color:var(--text)">📄 文件</a>';
      }
    });
    return h + '</div>';
  } catch(e) { return ''; }
}

// ==================== 通用详情 ====================
function showMachineryDetail(id) {
  api('/machinery/detail/'+id).then(function(item) {
    if (!item) return;
    var h = '<div style="line-height:1.8">';
    h += '<div><b>编号：</b>'+item.application_no+' | <span class="tag '+MA_ST_CLS[item.status]+'">'+MA_ST_MAP[item.status]+'</span> | <span class="tag">'+(MA_TYPE_MAP[item.application_type]||'短期')+'用车</span></div>';
    h += '<div style="border-top:1px solid var(--border);margin:8px 0"></div>';
    h += '<div><b>申请部门：</b>'+item.applicant_dept+'</div>';
    h += '<div><b>申请人：</b>'+item.applicant_name+' | <b>电话：</b>'+item.applicant_phone+'</div>';
    h += '<div><b>🚜 所需车型：</b><span style="color:var(--primary);font-weight:600">'+(item.vehicle_type || '未指定')+'</span></div>';
    h += '<div><b>📅 计划用车：</b>'+item.scheduled_start+' — '+item.scheduled_end+'</div>';
    if (item.status === 'completed' || item.status === 'early_completed') {
      var actualEnd = item.settlement_end_time || item.actual_end_time;
      if (actualEnd) {
        var startTime = item.scheduled_start; if (startTime.includes(' ')) startTime = startTime.split(' ')[1];
        h += '<div><b>⏱ 实际用车：</b>'+item.scheduled_start+' → '+actualEnd+' <span style="color:var(--warning)">('+item.working_hours+'h)</span></div>';
      }
    }
    h += '<div><b>作业地点：</b>'+item.work_location+(item.work_altitude ? ' | <b>海拔：</b>'+item.work_altitude : '')+'</div>';
    h += '<div><b>作业用途：</b>'+item.work_purpose+'</div>';
    h += '<div><b>紧急程度：</b>'+MA_URG_MAP[item.urgency]+' | <b>危险作业：</b>'+(Number(item.is_hazardous)?'<span style="color:var(--danger)">是</span>':'否')+'</div>';
    if (item.briefing_method) {
      h += '<div><b>交底方式：</b>'+(item.briefing_method==='attachment'?'📎 附件交底':'👤 现场交底')+'</div>';
      if (item.briefing_files && item.briefing_files !== '[]') h += '<div><b>交底文件：</b>'+renderBriefingFiles(item.briefing_files)+'</div>';
    }
    if (item.assigned_plate) {
      h += '<div style="border-top:1px solid var(--border);margin:8px 0"></div>';
      h += '<div style="color:var(--primary)"><b>🚛 指派车辆：</b>'+item.assigned_plate+'（'+item.assigned_vehicle_type+' '+item.assigned_vehicle_model+'）</div>';
      h += '<div><b>驾驶员：</b>'+(item.driver_name||'-')+' | <b>电话：</b>'+(item.driver_phone||'-')+'</div>';
      h += '<div><b>调度员：</b>'+(item.dispatcher_name||'-')+'</div><div><b>小时单价：</b>¥'+(item.hourly_rate||0)+'/h</div>';
    }
    if (item.status === 'completed' || item.status === 'early_completed') {
      h += '<div style="border-top:1px solid var(--border);margin:8px 0"></div>';
      h += '<div style="color:var(--success)"><b>✅ 结算</b></div>';
      h += '<div><b>工作工时：</b>'+item.working_hours+'h | <b>总费用：</b>¥'+item.total_cost+'</div>';
    }
    h += '<div style="border-top:1px solid var(--border);margin:8px 0"></div>';
    h += '<div style="font-size:12px;color:var(--text2)">申请时间：'+(item.created_at||'').slice(0,16)+' | 更新：'+(item.updated_at||'').slice(0,16)+'</div></div>';
    showModal('用车详情 — '+item.application_no, h);
  });
}

// ==================== 调度员：已派车收益明细 ====================
var _dispatchedPeriod = 'month'; // 默认本月

function showDispatchedOrders(period) {
  if (period) _dispatchedPeriod = period;
  var params = '?period=' + _dispatchedPeriod;

  api('/machinery/dispatched-list' + params).then(function(result) {
    var data = result.list || [];
    var stats = result.stats || {};

    var tabLabels = { today:'今日', month:'本月', year:'本年', custom:'自定义' };
    var tabs = ['today','month','year','custom'].map(function(p) {
      var active = _dispatchedPeriod === p ? ' style="background:var(--primary);color:#fff"' : '';
      return '<button class="btn btn-sm"'+active+' onclick="showDispatchedOrders(\''+p+'\')">'+tabLabels[p]+'</button>';
    }).join(' ');

    var customHtml = '';
    if (_dispatchedPeriod === 'custom') {
      customHtml = '<span style="margin-left:8px;font-size:13px">从 <input type="date" id="dispDateFrom" style="width:130px" /> 到 <input type="date" id="dispDateTo" style="width:130px" /> <button class="btn btn-sm btn-p" onclick="showDispatchedOrdersCustom()">查询</button></span>';
    }

    var summaryHtml = '<div class="stats-grid" style="margin-bottom:12px">'+
      '<div class="stat-item"><div class="stat-num">'+stats.totalCount+'</div><div class="stat-label">已派车订单</div></div>'+
      '<div class="stat-item"><div class="stat-num">'+stats.totalHours+'h</div><div class="stat-label">总工时</div></div>'+
      '<div class="stat-item"><div class="stat-num" style="color:var(--success)">¥'+stats.totalRevenue.toFixed(0)+'</div><div class="stat-label">总收益</div></div>'+
      '<div class="stat-item" onclick="exportDispatchedCSV()" style="cursor:pointer"><div class="stat-num" style="color:var(--primary)">📥</div><div class="stat-label">导出数据</div></div>'+
      '</div>';

    if (!data.length) {
      return showModal('💰 已派车收益明细',
        summaryHtml +
        '<div style="margin-bottom:8px">'+tabs+' '+customHtml+'</div>'+
        '<div class="empty">暂无已派车订单</div>'
      );
    }

    var rows = '';
    data.forEach(function(item) {
      var vehicle = (item.assigned_plate || '') + ' ' + (item.assigned_vehicle_type || '') + ' ' + (item.assigned_vehicle_model || '');
      var workTime = (item.scheduled_start || '') + ' ~ ' + (item.scheduled_end || '');
      var costDisplay = Number(item.total_cost) > 0 ? '¥' + Number(item.total_cost).toFixed(0) : '-';
      rows += '<tr>'+
        '<td>'+(item.created_at||'').slice(0,10)+'</td>'+
        '<td>'+item.applicant_dept+'</td>'+
        '<td>'+item.applicant_name+'</td>'+
        '<td><span style="color:var(--primary);font-weight:600">'+vehicle.trim()+'</span>'+(item.driver_name?'<br><span style="font-size:11px">👤 '+item.driver_name+'</span>':'')+'</td>'+
        '<td>'+item.work_location+'</td>'+
        '<td style="font-size:12px">'+workTime+'</td>'+
        '<td style="font-weight:bold;color:'+(Number(item.total_cost)>0?'var(--success)':'var(--text2)')+'">'+costDisplay+'</td>'+
        '<td><button class="btn btn-sm btn-s" onclick="showMachineryDetail('+item.id+')">详情</button></td>'+
        '</tr>';
    });

    var tableHtml = '<table><tr><th>申请日期</th><th>申请部门</th><th>申请人</th><th>车辆</th><th>作业地点</th><th>作业时间</th><th>产生费用</th><th>操作</th></tr>'+rows+'</table>';

    showModal('💰 已派车收益明细',
      summaryHtml +
      '<div style="margin-bottom:8px">'+tabs+' '+customHtml+'</div>'+
      tableHtml
    );
  });
}

  if (!dfVal && !dtVal) { alert('请至少选择一个日期'); return; }
  var params = [];
  if (dfVal) params.push('date_from=' + encodeURIComponent(dfVal));
  if (dtVal) params.push('date_to=' + encodeURIComponent(dtVal));
  api('/machinery/dispatched-list?' + params.join('&')).then(function(result) {
    var data = result.list || [];
    var stats = result.stats || {};

      '<div class="stat-item"><div class="stat-num">'+stats.totalCount+'</div><div class="stat-label">已派车订单</div></div>'+

      '<div class="stat-item"><div class="stat-num" style="color:var(--success)">¥'+stats.totalRevenue.toFixed(0)+'</div><div class="stat-label">总收益</div></div>'+
      '<div class="stat-item" onclick="exportDispatchedCSV()" style="cursor:pointer"><div class="stat-num" style="color:var(--primary)">📥</div><div class="stat-label">导出数据</div></div>'+
      '</div>';

    if (!data.length) {
      var mask = document.querySelector('.modal-mask');
      if (mask) {
        var box = mask.querySelector('.modal-box');
        if (box) box.innerHTML = '<h2>💰 已派车收益明细</h2>' + summaryHtml + '<div class="empty">该日期范围内暂无已派车订单</div>';
      }
      return;
    }

    var rows = '';
    data.forEach(function(item) {
      var vehicle = (item.assigned_plate || '') + ' ' + (item.assigned_vehicle_type || '') + ' ' + (item.assigned_vehicle_model || '');
      var workTime = (item.scheduled_start || '') + ' ~ ' + (item.scheduled_end || '');
      var costDisplay = Number(item.total_cost) > 0 ? '¥' + Number(item.total_cost).toFixed(0) : '-';
      rows += '<tr>'+
        '<td>'+(item.created_at||'').slice(0,10)+'</td>'+
        '<td>'+item.applicant_dept+'</td>'+
        '<td>'+item.applicant_name+'</td>'+
        '<td><span style="color:var(--primary);font-weight:600">'+vehicle.trim()+'</span>'+(item.driver_name?'<br><span style="font-size:11px">👤 '+item.driver_name+'</span>':'')+'</td>'+
        '<td>'+item.work_location+'</td>'+
        '<td style="font-size:12px">'+workTime+'</td>'+
        '<td style="font-weight:bold;color:'+(Number(item.total_cost)>0?'var(--success)':'var(--text2)')+'">'+costDisplay+'</td>'+
        '<td><button class="btn btn-sm btn-s" onclick="showMachineryDetail('+item.id+')">详情</button></td>'+
        '</tr>';
    });

    var tableHtml = '<table><tr><th>申请日期</th><th>申请部门</th><th>申请人</th><th>车辆</th><th>作业地点</th><th>作业时间</th><th>产生费用</th><th>操作</th></tr>'+rows+'</table>';

    var mask = document.querySelector('.modal-mask');
    if (mask) {
      var box = mask.querySelector('.modal-box');
      if (box) box.innerHTML = '<h2>💰 已派车收益明细</h2>' + summaryHtml + tableHtml;
    }
  });
}

// 导出当前已派车收益CSV
function exportDispatchedCSV() {
  var params = [];
  if (_dispatchedPeriod === 'custom') {
    var df = document.getElementById('dispDateFrom');
    var dt = document.getElementById('dispDateTo');
    if (df && df.value) params.push('date_from=' + encodeURIComponent(df.value));
    if (dt && dt.value) params.push('date_to=' + encodeURIComponent(dt.value));
  } else {
    params.push('period=' + _dispatchedPeriod);
  }
  var qs = params.length ? '?' + params.join('&') : '';

  var xbody = {};
  if (_dispatchedPeriod === 'custom') {
    var df = document.getElementById('dispDateFrom')?.value;
    var dt = document.getElementById('dispDateTo')?.value;
    if (df) xbody.date_from = df;
    if (dt) xbody.date_to = dt;
  } else if (_dispatchedPeriod) {
    xbody.period = _dispatchedPeriod;
  }
  downloadXLSX('/api/machinery/export-xlsx', xbody, '已派车收益明细');
}

  document.addEventListener('touchmove',function(e){if(tracking&&e.touches[0].clientX-sx>80&&Math.abs(e.touches[0].clientY-sy)<50){tracking=false;var modals=document.querySelectorAll('.modal-mask');if(modals.length){modals[modals.length-1].remove()}else{history.back()}}},{passive:true});

})();
